version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use
        - npm ci
    build:
      commands:
        # Seed production env from repo defaults, then merge Amplify console vars
        - cp .env.example .env.production
        - env | grep -e NEXT_PUBLIC_ >> .env.production || true
        - env | grep -e CONTACT_WEBHOOK_URL >> .env.production || true
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
